<!doctype html>
<html lang="de" data-theme="hell">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kellerwolke - Leerer Ordner</title>
    <link rel="stylesheet" href="/frontend/node_modules/@fontsource/barlow/400.css" />
    <link rel="stylesheet" href="/frontend/node_modules/@fontsource/barlow/500.css" />
    <link rel="stylesheet" href="/frontend/node_modules/@fontsource/barlow/600.css" />
    <link rel="stylesheet" href="/frontend/node_modules/@fortawesome/fontawesome-free/css/all.min.css" />
    <link rel="stylesheet" href="/mockups/stil.css" />
  </head>
  <body>
    <div class="app">
      <!-- Kopfleiste -->
      <header class="kopf">
        <div class="marke"><i class="fa-solid fa-cloud"></i> Kellerwolke</div>
        <div class="kopf-suche">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="In allen Dateien suchen ..." />
        </div>
        <div class="kopf-rechts">
          <div class="nutzer-bereich">
            <button class="nutzer-chip">
              <span class="avatar">M</span> Marcel <i class="fa-solid fa-chevron-down pfeil"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Navigation -->
      <nav class="nav">
        <div class="nav-titel">Bereiche <button class="nav-einklapp" title="Navigation ausblenden"><i class="fa-solid fa-angles-left"></i></button></div>
        <a class="nav-eintrag aktiv"><i class="fa-solid fa-folder"></i> Meine Dateien</a>
        <a class="nav-eintrag"><i class="fa-solid fa-star"></i> Favoriten</a>
        <a class="nav-eintrag"><i class="fa-solid fa-share-nodes"></i> Geteilt</a>
        <a class="nav-eintrag"><i class="fa-solid fa-folder-tree"></i> Externe Quellen</a>
        <a class="nav-eintrag"><i class="fa-solid fa-trash"></i> Papierkorb</a>
        <div class="nav-fuss">
          <div class="speicher">
            <div class="ring-zeile">
              <svg class="ring" viewBox="0 0 36 36" role="img" aria-label="Speicherbelegung">
                <circle class="spur" cx="18" cy="18" r="15.5" pathLength="100"></circle>
                <circle class="seg sonst" cx="18" cy="18" r="15.5" pathLength="100" stroke-dasharray="34 100" stroke-dashoffset="-6"></circle>
                <circle class="seg kw" cx="18" cy="18" r="15.5" pathLength="100" stroke-dasharray="6 100" stroke-dashoffset="0"></circle>
              </svg>
              <div class="legende">
                <div class="le"><span class="punkt kw"></span> Kellerwolke 92 GB</div>
                <div class="le"><span class="punkt frei"></span> Frei 980 GB</div>
              </div>
            </div>
          </div>
          <div class="nav-version">Kellerwolke v0.29.0</div>
        </div>
      </nav>

      <!-- Inhalt -->
      <section class="inhalt">
        <div class="werkzeuge">
          <button class="knopf primaer"><i class="fa-solid fa-folder-plus"></i> Neuer Ordner</button>
          <button class="knopf"><i class="fa-solid fa-arrow-up-from-bracket"></i> Hochladen</button>
          <span class="luecke"></span>
          <div class="ansicht-umschalter">
            <button class="aktiv" title="Liste"><i class="fa-solid fa-list"></i></button>
            <button title="Kacheln"><i class="fa-solid fa-table-cells-large"></i></button>
            <button title="Splitscreen"><i class="fa-solid fa-table-columns"></i></button>
          </div>
        </div>

        <nav class="breadcrumb">
          <a>Meine Dateien</a>
          <i class="fa-solid fa-chevron-right"></i>
          <a>Reisen</a>
          <i class="fa-solid fa-chevron-right"></i>
          <span class="aktuell">Reisen 2025</span>
        </nav>

        <div class="liste">
          <div class="leer">
            <i class="fa-regular fa-folder-open"></i>
            <div>Dieser Ordner ist leer</div>
            <div style="font-size:.85rem">Dateien hierher ziehen oder über "Hochladen" hinzufügen</div>
          </div>
        </div>
      </section>
    </div>

    <!-- Mockup-Leiste: Hell/Dunkel umschalten -->
    <div class="mock-leiste">
      <button data-theme-btn="hell" title="Hell"><i class="fa-solid fa-sun"></i></button>
      <button data-theme-btn="dunkel" title="Dunkel"><i class="fa-solid fa-moon"></i></button>
    </div>
    <script>
      const setzeThema = (t) => {
        document.documentElement.dataset.theme = t;
        document.querySelectorAll("[data-theme-btn]").forEach((b) =>
          b.classList.toggle("aktiv", b.dataset.themeBtn === t),
        );
      };
      document.querySelectorAll("[data-theme-btn]").forEach((b) => (b.onclick = () => setzeThema(b.dataset.themeBtn)));
      setzeThema("hell");
    </script>
  </body>
</html>
