name: Barrieren

on:
  push:
  pull_request:

jobs:
  pruefen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inhaltspruefung ueber alle Dateien
        run: python3 tools/checks/pruefe_inhalt.py --alle
      - name: VERSION ist gueltiges Semver
        run: grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION || { echo "VERSION kein Semver"; exit 1; }
      - name: Git-Identitaet aller gepushten Commits
        env:
          VORHER: ${{ github.event.before }}
        run: |
          if [ -z "$VORHER" ] || [ "$VORHER" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$VORHER^{commit}" 2>/dev/null; then
            bash tools/checks/pruefe_identitaet.sh --head
          else
            bash tools/checks/pruefe_identitaet.sh --bereich "$VORHER..HEAD"
          fi
      - name: Versionssprung gegenueber vorherigem Stand
        env:
          VORHER: ${{ github.event.before }}
        run: |
          if [ -z "$VORHER" ] || [ "$VORHER" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$VORHER^{commit}" 2>/dev/null; then
            echo "Kein Vorgaenger - Versionspruefung uebersprungen"; exit 0
          fi
          alt="$(git show "$VORHER:VERSION" 2>/dev/null | tr -d ' \t\n\r' || true)"
          neu="$(tr -d ' \t\n\r' < VERSION)"
          if [ -z "$alt" ]; then echo "Keine alte VERSION - ok"; exit 0; fi
          if [ "$alt" = "$neu" ]; then echo "BARRIERE: VERSION nicht erhoeht ($alt)"; exit 1; fi
          hoechste="$(printf '%s\n%s\n' "$alt" "$neu" | sort -V | tail -1)"
          if [ "$hoechste" != "$neu" ]; then echo "BARRIERE: VERSION nicht erhoeht ($alt -> $neu)"; exit 1; fi
          echo "VERSION $alt -> $neu in Ordnung"
